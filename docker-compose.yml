version: '3.9'
services:
  postgres:
    image: postgres:15
    container_name: outbox-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: outboxdb
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  kafka:
      image: confluentinc/cp-kafka:7.4.0
      hostname: kafka
      container_name: outbox-kafka
      ports:
        - "9092:9092"   
        - "9093:9093"   
      environment:
        KAFKA_KRAFT_MODE: "true"
        KAFKA_PROCESS_ROLES: "broker,controller"
        KAFKA_NODE_ID: 1
        KAFKA_BROKER_ID: 1
        KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
        KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093"
        KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_NUM_PARTITIONS: 1
        KAFKA_LOG_DIRS: "/var/lib/kafka/data"
        KAFKA_CLUSTER_ID: "i-B-MoIqSKGTKU-RhvY87Q"
        CLUSTER_ID: "i-B-MoIqSKGTKU-RhvY87Q"
        CONFLUENT_SUPPORT_METRICS_ENABLE: "false"
      volumes:
        - kafka-data:/var/lib/kafka/data
      healthcheck:
        test: ["CMD-SHELL", "echo > /dev/tcp/localhost/9092"]
        interval: 5s
        timeout: 5s
        retries: 5
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transactional-outbox-app
    ports:
      - "8080:8080"
    env_file:
      - .env.example
    depends_on:
      - postgres
      - kafka
    restart: unless-stopped
volumes:
  kafka-data:
